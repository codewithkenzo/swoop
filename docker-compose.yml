version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: swoop-postgres
    environment:
      POSTGRES_DB: swoop
      POSTGRES_USER: swoop_user
      POSTGRES_PASSWORD: swoop_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/dev/db-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swoop_user -d swoop"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: swoop-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@swoop.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local 